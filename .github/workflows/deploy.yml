name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # This step is a placeholder for deployment.
      # Users can configure their own deployment target (e.g. GitHub Pages, Firebase, etc.)
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
